{% load static %}
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bruno Narciso — Portfólio</title>
    <link rel="stylesheet" href="{% static 'portfolio/styles.css' %}">
    <style>
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            color: var(--texto);
            overflow: hidden;
            font-family: var(--fonte-principal);
        }

        .hero-glow {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .hero-glow::before,
        .hero-glow::after {
            content: "";
            position: absolute;
            width: 480px;
            height: 480px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.32;
        }

        .hero-glow::before {
            background: var(--ciano);
            top: -120px;
            left: -120px;
            animation: drift1 18s ease-in-out infinite alternate;
        }

        .hero-glow::after {
            background: var(--roxo);
            bottom: -140px;
            right: -100px;
            animation: drift2 22s ease-in-out infinite alternate;
        }

        @keyframes drift1 {
            from { transform: translate(0, 0); }
            to { transform: translate(90px, 60px); }
        }
        @keyframes drift2 {
            from { transform: translate(0, 0); }
            to { transform: translate(-70px, -50px); }
        }

        .hero-nav {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: flex-end;
            gap: 30px;
            padding: 28px 40px;
        }

        .hero-nav a {
            position: relative;
            color: var(--texto-mudo);
            text-decoration: none;
            font-weight: 600;
            padding-bottom: 4px;
        }

        .hero-nav a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0%;
            height: 2px;
            background: linear-gradient(90deg, var(--ciano), var(--roxo));
            transition: width 0.25s ease;
        }

        .hero-nav a:hover {
            color: var(--texto);
        }
        .hero-nav a:hover::after {
            width: 100%;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px;
            max-width: 760px;
        }

        .hero-content h1 {
            font-size: 52px;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 20px;
        }

        .terminal {
            background: var(--bg-card);
            border: 1px solid var(--borda);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 28px;
            box-shadow: 0 0 40px rgba(34,211,238,0.08);
        }

        .terminal-bar {
            display: flex;
            gap: 7px;
            padding: 10px 14px;
            background: #060a10;
            border-bottom: 1px solid var(--borda);
        }

        .terminal-dot {
            width: 11px;
            height: 11px;
            border-radius: 50%;
        }
        .terminal-dot.red { background: #f87171; }
        .terminal-dot.yellow { background: #facc15; }
        .terminal-dot.green { background: #34d399; }

        .terminal-body {
            padding: 20px 22px;
            font-family: var(--fonte-mono);
            font-size: 15px;
            min-height: 92px;
        }

        .terminal-line {
            color: var(--texto-mudo);
            line-height: 1.7;
        }

        .terminal-prompt {
            color: var(--verde);
        }

        .terminal-output {
            color: var(--texto);
        }

        #typed {
            color: var(--ciano);
        }

        .cursor {
            display: inline-block;
            width: 8px;
            background: var(--ciano);
            margin-left: 2px;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .hero-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 28px;
        }

        .hero-content a.cta {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(34,211,238,0.08);
            border: 1px solid var(--ciano);
            color: var(--ciano);
            padding: 12px 26px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            width: fit-content;
            transition: all 0.2s ease;
        }

        .hero-content a.cta:hover {
            background: var(--ciano);
            color: #0b0f17;
        }

        @media (max-width: 600px) {
            .hero-content h1 { font-size: 38px; }
            .hero-nav { gap: 18px; padding: 20px; }
        }
    </style>
</head>
<body>
    <section class="hero">
        <div class="hero-glow"></div>

        <nav class="hero-nav">
            <a href="{% url 'sobre_view' %}">Sobre</a>
            <a href="{% url 'artigos_view' %}">Artigos</a>
            <a href="{% url 'licenciaturas_view' %}">Portfólio</a>
        </nav>

        <div class="hero-content">
            <h1>Bruno Alexandre</h1>

            <div class="terminal">
                <div class="terminal-bar">
                    <span class="terminal-dot red"></span>
                    <span class="terminal-dot yellow"></span>
                    <span class="terminal-dot green"></span>
                </div>
                <div class="terminal-body">
                    <div class="terminal-line"><span class="terminal-prompt">bruno@portfolio</span>:~$ whoami</div>
                    <div class="terminal-line terminal-output">Estudante de Engenharia Informática, 2º ano</div>
                    <div class="terminal-line" style="margin-top:10px;">
                        <span class="terminal-prompt">bruno@portfolio</span>:~$ <span id="typed"></span><span class="cursor">&nbsp;</span>
                    </div>
                </div>
            </div>

            <div class="hero-badges">
                <span class="badge">Cibersegurança</span>
                <span class="badge">Linux</span>
                <span class="badge">IA</span>
                <span class="badge badge-projeto">CachyOS</span>
            </div>

            <a href="{% url 'licenciaturas_view' %}" class="cta">Ver o meu portfólio →</a>
        </div>
    </section>

    <script>
        const frases = [
            "Apaixonado por cibersegurança, Linux e IA",
            "A construir a Ária: assistente pessoal com IA",
            "CachyOS · fish shell · sempre a aprender"
        ];
        const el = document.getElementById('typed');
        let fi = 0, ci = 0, deleting = false;

        function tick() {
            const frase = frases[fi];
            if (!deleting) {
                ci++;
                el.textContent = frase.slice(0, ci);
                if (ci === frase.length) {
                    deleting = true;
                    setTimeout(tick, 1800);
                    return;
                }
            } else {
                ci--;
                el.textContent = frase.slice(0, ci);
                if (ci === 0) {
                    deleting = false;
                    fi = (fi + 1) % frases.length;
                }
            }
            setTimeout(tick, deleting ? 35 : 55);
        }
        tick();
    </script>
</body>
</html>
