{% extends "portfolio/base.html" %}
{% block content %}
<h2>Login por Link Mágico</h2>

{% if mensagem %}
    <p>{{ mensagem }}</p>
{% endif %}

<form method="post">
    {% csrf_token %}
    <p>
        <label>Email:</label><br>
        <input type="email" name="email" required>
    </p>
    <button type="submit">Enviar link</button>
</form>
{% endblock %}
